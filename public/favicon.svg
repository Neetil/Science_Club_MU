<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="30" stroke="rgba(34, 211, 238, 0.25)" stroke-width="2" fill="none"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="22" stroke="rgba(56, 189, 248, 0.4)" stroke-width="1.5" fill="none"/>
  <!-- Center gradient circle -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="18" fill="url(#gradient)"/>
  <!-- PA text -->
  <text x="32" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.5">PA</text>
</svg>
